# mise — global runtime versions (symlinked to ~/.config/mise/config.toml)
# Per-project versions go in a project-local mise.toml / .tool-versions.
# Install/update these with: mise install

[tools]
node = "24"
python = "3.14"    # mise is the source of truth for Python (brew python@3.11 removed)

[settings]
# Reuse asdf-style .tool-versions and .nvmrc files if present in a project:
idiomatic_version_file_enable_tools = ["node", "python"]
