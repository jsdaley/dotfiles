name: ci

on:
  push:
  pull_request:

permissions:
  contents: read

jobs:
  shellcheck:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: ludeeus/action-shellcheck@master
        with:
          severity: warning
          # zsh files aren't shellcheck-able; bin/ and osx/ are inherited legacy.
          ignore_paths: zsh bin osx
        env:
          SHELLCHECK_OPTS: -e SC1071 -e SC2088

  gitleaks:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: gitleaks/gitleaks-action@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          # Free key from gitleaks.io — required by the action for org-owned runs.
          GITLEAKS_LICENSE: ${{ secrets.GITLEAKS_LICENSE }}
