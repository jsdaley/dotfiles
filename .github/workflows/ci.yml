name: ci

on:
  push:
  pull_request:

permissions:
  contents: read

jobs:
  shellcheck:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: ludeeus/action-shellcheck@master
        with:
          severity: warning
          # zsh files aren't shellcheck-able; bin/ and osx/ are inherited legacy.
          ignore_paths: zsh bin osx
        env:
          SHELLCHECK_OPTS: -e SC1071 -e SC2088

  gitleaks:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: gitleaks (binary — avoids the licensed action)
        run: |
          ver=8.28.0
          curl -sSfL "https://github.com/gitleaks/gitleaks/releases/download/v${ver}/gitleaks_${ver}_linux_x64.tar.gz" \
            | tar -xz gitleaks
          ./gitleaks detect --redact --no-banner
