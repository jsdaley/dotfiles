# links.conf — the single source of truth for symlinks. Read by link.sh.
# Format:  <repo source> | <target>            | <when>
#   - target: ~ expands to $HOME
#   - when:   all (default) | macos | linux     (controls per-OS linking)
# Replaces the old *.symlink convention + hardcoded bootstrap mappings.

# shell
zsh/zshrc                  | ~/.zshrc                                              | all
zsh/p10k.zsh               | ~/.p10k.zsh                                           | all
zsh/zprofile               | ~/.zprofile                                           | macos

# git
git/gitconfig              | ~/.gitconfig                                          | all
git/gitexcludes            | ~/.gitexcludes                                        | all

# ssh (shared options; hosts live in ~/.ssh/config.local, not linked)
ssh/config                 | ~/.ssh/config                                         | all

# XDG tool configs
config/atuin/config.toml   | ~/.config/atuin/config.toml                           | all
config/mise/config.toml    | ~/.config/mise/config.toml                            | all
config/micro/bindings.json | ~/.config/micro/bindings.json                         | all

# macOS GUI apps (headless servers skip these)
claude/settings.json       | ~/.claude/settings.json                               | macos
vscode/settings.json       | ~/Library/Application Support/Code/User/settings.json    | macos
vscode/keybindings.json    | ~/Library/Application Support/Code/User/keybindings.json | macos
